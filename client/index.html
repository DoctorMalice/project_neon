<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Neon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', system-ui, sans-serif; }

    #game-container { position: relative; width: 100%; height: 100%; }
    canvas { display: block; }

    /* ---- Join screen / Character creation ---- */
    #join-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #111;
      z-index: 100;
      gap: 12px;
    }
    #join-screen h1 { color: #e8d8a8; font-size: 2.5rem; margin-bottom: 0.5rem; }
    #join-screen h2 { color: #e8d8a8; font-size: 1.5rem; }
    #join-screen input {
      width: 280px; padding: 12px 16px; font-size: 1rem;
      border: 2px solid rgba(200, 184, 138, 0.5); border-radius: 8px;
      background: rgba(200, 184, 138, 0.06); color: #fff;
      outline: none; text-align: center;
    }
    #join-screen input::placeholder { color: rgba(255,255,255,0.4); }
    #join-screen input:focus { border-color: #e8d8a8; }

    .cc-btn {
      padding: 10px 32px; font-size: 0.95rem;
      border: 1px solid rgba(200, 184, 138, 0.3); border-radius: 8px; cursor: pointer;
      background: rgba(200, 184, 138, 0.08); color: #c8b88a; font-weight: 600;
      transition: background 0.15s, border-color 0.15s;
    }
    .cc-btn:hover { background: rgba(200, 184, 138, 0.15); }
    .cc-btn.primary {
      background: #c8b88a; color: #1a1a1a; font-weight: 700;
      border: none;
    }
    .cc-btn.primary:hover { background: #d8c89a; }

    .cc-heading { color: #e8d8a8; font-size: 1.4rem; margin-bottom: 4px; }
    .cc-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px; width: 380px; max-width: 95vw;
    }
    .cc-option-btn {
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 8px; gap: 4px;
      background: rgba(200, 184, 138, 0.06);
      border: 1px solid rgba(200, 184, 138, 0.2); border-radius: 8px;
      cursor: pointer; color: #ddd; transition: background 0.15s, border-color 0.15s;
    }
    .cc-option-btn:hover {
      background: rgba(200, 184, 138, 0.15);
      border-color: #c8b88a;
    }
    .cc-option-name { font-size: 14px; font-weight: 700; color: #e8d8a8; }
    .cc-option-desc { font-size: 11px; color: #999; }

    .cc-points { color: #c8b88a; font-size: 14px; font-weight: 600; }
    .cc-attr-list {
      display: flex; flex-direction: column; gap: 3px;
      max-height: 320px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
      width: 260px;
    }
    .cc-attr-row {
      display: flex; align-items: center; gap: 6px;
      padding: 2px 0;
    }
    .cc-attr-label { width: 36px; font-size: 12px; color: #aaa; font-weight: 600; }
    .cc-attr-val { width: 30px; text-align: right; font-size: 13px; color: #e8d8a8; font-weight: 600; }
    .cc-attr-btn {
      width: 22px; height: 22px; padding: 0;
      font-size: 14px; line-height: 1;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; color: #ccc; cursor: pointer;
    }
    .cc-attr-btn:hover { background: rgba(200, 184, 138, 0.2); color: #fff; }
    .cc-btn-row { display: flex; gap: 12px; }

    /* Hide game UI while in setup */
    #game-container.setup-active #chat-container,
    #game-container.setup-active #inventory-btn,
    #game-container.setup-active #inventory-panel,
    #game-container.setup-active #character-btn,
    #game-container.setup-active #character-panel,
    #game-container.setup-active #debug-overlay,
    #game-container.setup-active #labels-container {
      display: none !important;
    }

    /* ---- Chat ---- */
    #chat-container {
      position: absolute; bottom: 0; left: 0;
      width: 400px; max-width: 100%;
      display: flex; flex-direction: column;
      pointer-events: none;
      z-index: 50;
    }
    #chat-log {
      max-height: 200px; overflow-y: auto;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.55);
      display: flex; flex-direction: column; gap: 2px;
      pointer-events: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .chat-message { font-size: 0.85rem; color: #ddd; line-height: 1.3; }
    .chat-message .name { color: #e8d8a8; font-weight: 600; }
    .chat-message.system { color: #888; font-style: italic; }

    #chat-input-row {
      display: flex;
      background: rgba(0, 0, 0, 0.7);
      pointer-events: auto;
    }
    #chat-input {
      flex: 1; padding: 8px 12px; font-size: 0.85rem;
      border: none; outline: none;
      background: transparent; color: #fff;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.35); }

    /* ---- Player labels (rendered in HTML overlay) ---- */
    #labels-container {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ---- Debug overlay ---- */
    #debug-overlay {
      position: absolute; top: 8px; right: 8px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.6);
      color: #9a9; font-size: 12px; font-family: 'Consolas', 'Courier New', monospace;
      line-height: 1.5;
      border-radius: 4px;
      pointer-events: none;
      z-index: 50;
    }

    /* ---- Context menu ---- */
    #context-menu {
      position: absolute;
      background: rgba(20, 18, 15, 0.94);
      border: 1px solid rgba(200, 184, 138, 0.25);
      border-radius: 6px;
      padding: 4px 0;
      min-width: 140px;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      pointer-events: auto;
    }
    .context-menu-item {
      padding: 6px 16px;
      font-size: 13px;
      color: #ddd;
      cursor: pointer;
      user-select: none;
    }
    .context-menu-item:hover {
      background: rgba(200, 184, 138, 0.15);
      color: #fff;
    }
    .context-menu-item.disabled {
      color: #555;
      cursor: default;
    }
    .context-menu-item.disabled:hover {
      background: none;
      color: #555;
    }

    /* ---- Inventory ---- */
    #inventory-btn {
      position: absolute; bottom: 12px; right: 12px;
      padding: 8px 16px;
      background: rgba(20, 18, 15, 0.85);
      border: 1px solid rgba(200, 184, 138, 0.3);
      border-radius: 6px;
      color: #c8b88a; font-size: 13px; font-weight: 600;
      cursor: pointer; user-select: none;
      z-index: 60;
      transition: background 0.15s, border-color 0.15s;
    }
    #inventory-btn:hover {
      background: rgba(200, 184, 138, 0.1);
      border-color: #c8b88a;
    }
    #inventory-panel {
      position: absolute; bottom: 50px; right: 12px;
      width: 220px;
      background: rgba(20, 18, 15, 0.94);
      border: 1px solid rgba(200, 184, 138, 0.25);
      border-radius: 8px;
      display: flex; flex-direction: column;
      z-index: 60;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      pointer-events: auto;
    }
    .inventory-header {
      padding: 10px 14px;
      color: #c8b88a; font-size: 14px; font-weight: 700;
      border-bottom: 1px solid rgba(200, 184, 138, 0.15);
    }
    .inventory-list {
      padding: 8px 14px;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .inventory-item {
      padding: 4px 0;
      color: #ddd; font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .inventory-item span { flex: 1; }
    .inventory-empty {
      padding: 4px 0;
      color: #555; font-size: 13px;
      font-style: italic;
    }
    .inv-equip-btn {
      padding: 2px 8px; font-size: 11px;
      background: rgba(200, 184, 138, 0.1);
      border: 1px solid rgba(200, 184, 138, 0.25);
      border-radius: 4px; color: #c8b88a;
      cursor: pointer; flex-shrink: 0;
    }
    .inv-equip-btn:hover {
      background: rgba(200, 184, 138, 0.2);
    }
    .equip-slot-label {
      color: #888; font-size: 11px; font-weight: 600;
      min-width: 48px; flex: 0 !important;
    }

    .craft-recipe {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .craft-recipe:last-child { border-bottom: none; }
    .craft-recipe-name {
      font-size: 12px; font-weight: 600; color: #c8b88a;
      margin-bottom: 3px;
    }
    .craft-ingredients {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-bottom: 4px;
    }
    .craft-ingredient {
      font-size: 11px; padding: 1px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
    }
    .craft-ingredient.have { color: #6cb86c; }
    .craft-ingredient.need { color: #d05545; }

    .combat-label {
      position: absolute;
      color: #e85040;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-align: center;
      transform: translate(-50%, -100%);
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      white-space: nowrap;
    }

    .chat-bubble {
      position: absolute;
      background: rgba(0,0,0,0.75);
      color: #fff; font-size: 12px;
      padding: 4px 10px; border-radius: 10px;
      max-width: 200px; word-wrap: break-word;
      text-align: center;
      transform: translate(-50%, -100%);
      pointer-events: none;
      white-space: pre-wrap;
    }

    /* ---- Character panel ---- */
    #character-btn {
      position: absolute; bottom: 12px; right: 120px;
      padding: 8px 16px;
      background: rgba(20, 18, 15, 0.85);
      border: 1px solid rgba(200, 184, 138, 0.3);
      border-radius: 6px;
      color: #c8b88a; font-size: 13px; font-weight: 600;
      cursor: pointer; user-select: none;
      z-index: 60;
      transition: background 0.15s, border-color 0.15s;
    }
    #character-btn:hover {
      background: rgba(200, 184, 138, 0.1);
      border-color: #c8b88a;
    }
    #character-panel {
      position: absolute; bottom: 50px; right: 120px;
      width: 240px;
      background: rgba(20, 18, 15, 0.94);
      border: 1px solid rgba(200, 184, 138, 0.25);
      border-radius: 8px;
      display: flex; flex-direction: column;
      z-index: 60;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      pointer-events: auto;
      max-height: 500px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
      padding: 10px 14px;
      gap: 6px;
    }
    .cp-header {
      color: #c8b88a; font-size: 14px; font-weight: 700;
      border-bottom: 1px solid rgba(200, 184, 138, 0.15);
      padding-bottom: 6px;
    }
    .cp-level { color: #e8d8a8; font-size: 13px; font-weight: 600; }
    .cp-xp-row { display: flex; align-items: center; gap: 8px; }
    .cp-xp-bar {
      flex: 1; height: 6px; background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .cp-xp-fill { height: 100%; background: linear-gradient(90deg, #d4b84a, #e8d060); border-radius: 3px; }
    .cp-xp-text { font-size: 10px; color: #888; white-space: nowrap; }
    .cp-section-title {
      color: #999; font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; margin-top: 4px;
    }
    .cp-points { color: #d4b84a; font-weight: 700; text-transform: none; letter-spacing: 0; }
    .cp-pools {
      display: flex; flex-wrap: wrap; gap: 6px;
      font-size: 11px; color: #ccc;
    }
    .cp-attr-list { display: flex; flex-direction: column; gap: 1px; }
    .cp-attr-row { display: flex; align-items: center; gap: 4px; padding: 1px 0; }
    .cp-attr-label { width: 30px; font-size: 11px; color: #888; font-weight: 600; }
    .cp-attr-val { width: 28px; text-align: right; font-size: 12px; color: #ddd; }
    .cp-attr-btn {
      width: 18px; height: 18px; padding: 0;
      font-size: 12px; line-height: 1;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px; color: #ccc; cursor: pointer;
    }
    .cp-attr-btn:hover { background: rgba(200, 184, 138, 0.2); color: #fff; }
    .cp-apply-btn {
      padding: 6px 16px; font-size: 12px; font-weight: 600;
      background: rgba(200, 184, 138, 0.15);
      border: 1px solid rgba(200, 184, 138, 0.3);
      border-radius: 6px; color: #e8d8a8; cursor: pointer;
      transition: all 0.15s;
    }
    .cp-apply-btn:hover { background: rgba(200, 184, 138, 0.25); }
    .cp-apply-btn:disabled { opacity: 0.4; cursor: default; }

    /* ---- Combat overlay ---- */
    #combat-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      z-index: 80;
      pointer-events: auto;
    }
    #combat-panel {
      width: 520px; max-width: 95vw;
      background: rgba(20, 18, 15, 0.96);
      border: 1px solid rgba(200, 184, 138, 0.25);
      border-radius: 10px;
      padding: 0;
      display: flex; flex-direction: column;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    /* Header */
    #combat-header {
      padding: 12px 20px;
      background: rgba(200, 184, 138, 0.06);
      border-bottom: 1px solid rgba(200, 184, 138, 0.15);
      display: flex; align-items: center; justify-content: space-between;
    }
    #combat-round-label {
      font-size: 14px; font-weight: 700; color: #e8d8a8;
      letter-spacing: 0.5px;
    }
    #combat-timer {
      font-size: 13px; font-weight: 700; color: #c8b88a;
      font-variant-numeric: tabular-nums;
    }
    #combat-timer.combat-timer-urgent {
      color: #e85040;
    }

    /* Participants area */
    #combat-participants {
      display: flex; align-items: stretch;
      padding: 14px 16px;
      gap: 12px;
    }
    #combat-enemies-col, #combat-allies-col {
      flex: 1; display: flex; flex-direction: column; gap: 6px;
      min-width: 0;
    }
    #combat-enemies, #combat-allies {
      display: flex; flex-direction: column; gap: 6px;
    }
    #combat-vs {
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #555;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .combat-section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 2px;
    }
    .combat-section-label.enemy-label { color: #e85040; }
    .combat-section-label.ally-label { color: #6cb86c; }

    /* Participant cards */
    .combat-card {
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .combat-card.enemy { border-left: 2px solid rgba(232, 80, 64, 0.5); }
    .combat-card.ally { border-left: 2px solid rgba(90, 170, 68, 0.5); }
    .combat-card.me { background: rgba(200, 184, 138, 0.06); }
    .combat-card-name {
      font-size: 12px; font-weight: 600;
    }
    .combat-card.enemy .combat-card-name { color: #e88070; }
    .combat-card.ally .combat-card-name { color: #c8b88a; }
    .combat-card.me .combat-card-name { color: #e8d8a8; font-weight: 700; }

    .combat-card-bar-row {
      display: flex; align-items: center; gap: 6px;
    }
    .combat-bar-label {
      font-size: 9px; font-weight: 700; color: #666;
      width: 18px; flex-shrink: 0;
    }
    .combat-bar-value {
      font-size: 10px; color: #999;
      white-space: nowrap; flex-shrink: 0;
      min-width: 48px; text-align: right;
    }

    .combat-bar-container {
      flex: 1; height: 8px; min-width: 40px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px; overflow: hidden;
    }
    .combat-bar-container.mp-bar { height: 6px; }
    .combat-bar-container.sp-bar { height: 6px; }
    .combat-bar {
      height: 100%; border-radius: 4px;
      transition: width 0.3s ease;
    }
    .combat-bar.hp { background: linear-gradient(90deg, #c44, #d77); }
    .combat-bar.mp { background: linear-gradient(90deg, #558, #77a); }
    .combat-bar.sp { background: linear-gradient(90deg, #a85, #cb7); }
    .combat-card.ally .combat-bar.hp { background: linear-gradient(90deg, #5a4, #7c6); }

    /* Ally status */
    .combat-ally-status {
      font-size: 10px; font-weight: 600;
      padding: 2px 0;
      letter-spacing: 0.3px;
    }
    .combat-ally-status.deciding {
      color: #a89860;
      font-style: italic;
    }
    .combat-ally-status.ready {
      color: #6cb86c;
    }

    /* Combat log */
    #combat-log {
      max-height: 150px; overflow-y: auto;
      padding: 8px 16px;
      margin: 16px;
      background: rgba(0,0,0,0.3);
      border-radius: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .combat-log-entry {
      font-size: 11px; color: #bbb; line-height: 1.5;
    }
    .combat-log-entry.crit { color: #e8c040; font-weight: 600; }
    .combat-log-entry.dodged { color: #8aa8cc; font-style: italic; }
    .combat-log-prompt { color: #c8b88a; font-style: italic; }
    .combat-log-waiting { color: #888; font-style: italic; }

    .combat-next-btn {
      display: block;
      margin: 8px auto 2px;
      padding: 5px 24px;
      font-size: 12px; font-weight: 600;
      background: rgba(200, 184, 138, 0.15);
      border: 1px solid rgba(200, 184, 138, 0.3);
      border-radius: 5px;
      color: #e8d8a8;
      cursor: pointer;
      transition: background 0.15s;
    }
    .combat-next-btn:hover {
      background: rgba(200, 184, 138, 0.28);
    }

    /* Controls */
    #combat-controls {
      padding: 12px 16px;
      display: flex; flex-direction: column; gap: 8px;
      border-top: 1px solid rgba(200, 184, 138, 0.1);
    }
    .combat-control-group {
      display: flex; flex-direction: column; gap: 4px;
    }
    .combat-control-label {
      font-size: 10px; font-weight: 600; color: #777;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .combat-btn-row {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .combat-toggle-btn {
      padding: 4px 10px; font-size: 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: #aaa; cursor: pointer;
      transition: all 0.15s;
    }
    .combat-toggle-btn:hover { background: rgba(200, 184, 138, 0.12); color: #fff; }
    .combat-toggle-btn.active {
      background: rgba(200, 184, 138, 0.2);
      border-color: #c8b88a; color: #e8d8a8; font-weight: 600;
    }

    .combat-divider {
      height: 1px;
      background: rgba(200, 184, 138, 0.1);
      margin: 2px 0;
    }

    .combat-action-btn {
      padding: 8px 20px; font-size: 13px; font-weight: 600;
      border: 1px solid rgba(200, 184, 138, 0.25);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      color: #fff;
    }
    .combat-action-btn.attack { background: rgba(200, 60, 50, 0.25); border-color: rgba(200,60,50,0.4); }
    .combat-action-btn.attack:hover { background: rgba(200, 60, 50, 0.4); }
    .combat-action-btn.defend { background: rgba(60, 100, 180, 0.25); border-color: rgba(60,100,180,0.4); }
    .combat-action-btn.defend:hover { background: rgba(60, 100, 180, 0.4); }
    .combat-action-btn.run { background: rgba(180, 160, 60, 0.2); border-color: rgba(180,160,60,0.35); }
    .combat-action-btn.run:hover { background: rgba(180, 160, 60, 0.35); }
    .combat-action-btn.disabled, .combat-action-btn:disabled {
      opacity: 0.4; cursor: default;
    }
    .combat-action-btn.disabled:hover, .combat-action-btn:disabled:hover {
      background: inherit;
    }

    .combat-status {
      text-align: center; font-size: 12px; color: #888;
      font-style: italic; padding: 4px 0;
    }

    /* Result */
    #combat-result {
      text-align: center; padding: 16px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .combat-result-title {
      font-size: 22px; font-weight: 700;
    }
    .combat-result-title.victory { color: #6cb86c; }
    .combat-result-title.defeat { color: #d05545; }
    .combat-result-title.fled { color: #c8b060; }
    .combat-reward { font-size: 13px; color: #d4b84a; }
    #combat-close-btn {
      margin-top: 8px;
      background: rgba(200, 184, 138, 0.12);
      border-color: rgba(200, 184, 138, 0.35);
    }
    #combat-close-btn:hover {
