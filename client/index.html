<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Neon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', system-ui, sans-serif; }

    #game-container { position: relative; width: 100%; height: 100%; }
    canvas { display: block; }

    /* ---- Join screen ---- */
    #join-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
    }
    #join-screen h1 { color: #0ff; font-size: 2.5rem; margin-bottom: 1.5rem; text-shadow: 0 0 20px #0ff; }
    #join-screen input {
      width: 280px; padding: 12px 16px; font-size: 1rem;
      border: 2px solid #0ff; border-radius: 8px;
      background: rgba(0, 255, 255, 0.05); color: #fff;
      outline: none; text-align: center;
    }
    #join-screen input::placeholder { color: rgba(255,255,255,0.4); }
    #join-screen input:focus { border-color: #fff; box-shadow: 0 0 15px rgba(0,255,255,0.3); }
    #join-screen button {
      margin-top: 1rem; padding: 12px 40px; font-size: 1rem;
      border: none; border-radius: 8px; cursor: pointer;
      background: #0ff; color: #111; font-weight: 700;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #join-screen button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0,255,255,0.5); }

    /* ---- Chat ---- */
    #chat-container {
      position: absolute; bottom: 0; left: 0;
      width: 400px; max-width: 100%;
      display: flex; flex-direction: column;
      pointer-events: none;
      z-index: 50;
    }
    #chat-log {
      max-height: 200px; overflow-y: auto;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.55);
      display: flex; flex-direction: column; gap: 2px;
      pointer-events: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .chat-message { font-size: 0.85rem; color: #ddd; line-height: 1.3; }
    .chat-message .name { color: #0ff; font-weight: 600; }
    .chat-message.system { color: #888; font-style: italic; }

    #chat-input-row {
      display: flex;
      background: rgba(0, 0, 0, 0.7);
      pointer-events: auto;
    }
    #chat-input {
      flex: 1; padding: 8px 12px; font-size: 0.85rem;
      border: none; outline: none;
      background: transparent; color: #fff;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.35); }

    /* ---- Player labels (rendered in HTML overlay) ---- */
    #labels-container {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 10;
    }
/* ---- Debug overlay ---- */
    #debug-overlay {
      position: absolute; top: 8px; right: 8px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.6);
      color: #0f0; font-size: 12px; font-family: 'Consolas', 'Courier New', monospace;
      line-height: 1.5;
      border-radius: 4px;
      pointer-events: none;
      z-index: 50;
    }

    /* ---- Context menu ---- */
    #context-menu {
      position: absolute;
      background: rgba(15, 15, 20, 0.92);
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 6px;
      padding: 4px 0;
      min-width: 140px;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      pointer-events: auto;
    }
    .context-menu-item {
      padding: 6px 16px;
      font-size: 13px;
      color: #ddd;
      cursor: pointer;
      user-select: none;
    }
    .context-menu-item:hover {
      background: rgba(0, 255, 255, 0.15);
      color: #fff;
    }
    .context-menu-item.disabled {
      color: #555;
      cursor: default;
    }
    .context-menu-item.disabled:hover {
      background: none;
      color: #555;
    }

    /* ---- Inventory ---- */
    #inventory-btn {
      position: absolute; bottom: 12px; right: 12px;
      padding: 8px 16px;
      background: rgba(15, 15, 20, 0.85);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 6px;
      color: #0ff; font-size: 13px; font-weight: 600;
      cursor: pointer; user-select: none;
      z-index: 60;
      transition: background 0.15s, border-color 0.15s;
    }
    #inventory-btn:hover {
      background: rgba(0, 255, 255, 0.12);
      border-color: #0ff;
    }
    #inventory-panel {
      position: absolute; bottom: 50px; right: 12px;
      width: 220px;
      background: rgba(15, 15, 20, 0.92);
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 8px;
      display: flex; flex-direction: column;
      z-index: 60;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      pointer-events: auto;
    }
    .inventory-header {
      padding: 10px 14px;
      color: #0ff; font-size: 14px; font-weight: 700;
      border-bottom: 1px solid rgba(0, 255, 255, 0.15);
    }
    .inventory-list {
      padding: 8px 14px;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .inventory-item {
      padding: 4px 0;
      color: #ddd; font-size: 13px;
    }
    .inventory-empty {
      padding: 4px 0;
      color: #555; font-size: 13px;
      font-style: italic;
    }

    .combat-label {
      position: absolute;
      color: #f44;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-align: center;
      transform: translate(-50%, -100%);
      pointer-events: none;
      text-shadow: 0 0 4px rgba(255, 68, 68, 0.6), 0 1px 2px rgba(0,0,0,0.8);
      white-space: nowrap;
    }

    .chat-bubble {
      position: absolute;
      background: rgba(0,0,0,0.75);
      color: #fff; font-size: 12px;
      padding: 4px 10px; border-radius: 10px;
      max-width: 200px; word-wrap: break-word;
      text-align: center;
      transform: translate(-50%, -100%);
      pointer-events: none;
      white-space: pre-wrap;
    }

    /* ---- Combat overlay ---- */
    #combat-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      z-index: 80;
      pointer-events: auto;
    }
    #combat-panel {
      width: 440px; max-width: 95vw;
      background: rgba(10, 10, 18, 0.95);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      padding: 18px 20px;
      display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
    }

    .combat-participant {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .combat-participant.enemy .combat-name { color: #f44; }
    .combat-participant.ally .combat-name { color: #0ff; }
    .combat-participant.ally.me .combat-name { color: #0f0; }
    .combat-name { font-size: 13px; font-weight: 600; min-width: 90px; }
    .combat-hp-text, .combat-mp-text { font-size: 11px; color: #aaa; min-width: 70px; }

    .combat-bar-container {
      flex: 1; height: 10px; min-width: 100px;
      background: rgba(255,255,255,0.08);
      border-radius: 5px; overflow: hidden;
    }
    .combat-bar-container.mp-bar { height: 6px; }
    .combat-bar {
      height: 100%; border-radius: 5px;
      transition: width 0.3s ease;
    }
    .combat-bar.hp { background: linear-gradient(90deg, #f44, #f88); }
    .combat-bar.mp { background: linear-gradient(90deg, #44f, #88f); }
    .combat-participant.ally .combat-bar.hp { background: linear-gradient(90deg, #0a4, #0f8); }

    #combat-log {
      max-height: 120px; overflow-y: auto;
      padding: 8px 10px;
      background: rgba(0,0,0,0.4);
      border-radius: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .combat-log-entry {
      font-size: 12px; color: #ccc; line-height: 1.5;
    }
    .combat-log-entry.crit { color: #ff0; font-weight: 600; }
    .combat-log-entry.dodged { color: #8af; font-style: italic; }

    .combat-btn-row {
      display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
    }
    .combat-toggle-btn {
      padding: 5px 10px; font-size: 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: #aaa; cursor: pointer;
      transition: all 0.15s;
    }
    .combat-toggle-btn:hover { background: rgba(0,255,255,0.1); color: #fff; }
    .combat-toggle-btn.active {
      background: rgba(0,255,255,0.18);
      border-color: #0ff; color: #0ff; font-weight: 600;
    }

    .combat-divider {
      height: 1px;
      background: rgba(0,255,255,0.15);
      margin: 4px 0;
    }

    .combat-action-btn {
      padding: 8px 20px; font-size: 13px; font-weight: 600;
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      color: #fff;
    }
    .combat-action-btn.attack { background: rgba(255, 60, 60, 0.25); border-color: rgba(255,60,60,0.4); }
    .combat-action-btn.attack:hover { background: rgba(255, 60, 60, 0.4); }
    .combat-action-btn.defend { background: rgba(60, 120, 255, 0.25); border-color: rgba(60,120,255,0.4); }
    .combat-action-btn.defend:hover { background: rgba(60, 120, 255, 0.4); }
    .combat-action-btn.run { background: rgba(255, 200, 0, 0.2); border-color: rgba(255,200,0,0.3); }
    .combat-action-btn.run:hover { background: rgba(255, 200, 0, 0.35); }
    .combat-action-btn.disabled, .combat-action-btn:disabled {
      opacity: 0.4; cursor: default;
    }
    .combat-action-btn.disabled:hover, .combat-action-btn:disabled:hover {
      background: inherit;
    }

    .combat-status {
      text-align: center; font-size: 12px; color: #888;
      font-style: italic; padding: 4px 0;
    }

    #combat-result {
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .combat-result-title {
      font-size: 22px; font-weight: 700;
      text-shadow: 0 0 15px currentColor;
    }
    .combat-result-title.victory { color: #0f0; }
    .combat-result-title.defeat { color: #f44; }
    .combat-result-title.fled { color: #ff0; }
    .combat-reward { font-size: 13px; color: #ffd700; }
    #combat-close-btn {
      margin-top: 8px;
      background: rgba(0,255,255,0.15);
      border-color: rgba(0,255,255,0.4);
    }
    #combat-close-btn:hover {
      background: rgba(0,255,255,0.3);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- PixiJS canvas is appended here -->
    <div id="labels-container"></div>

    <!-- Join screen -->
    <div id="join-screen">
      <h1>Project Neon</h1>
      <input id="name-input" type="text" placeholder="Enter your name" maxlength="16" autofocus />
      <button id="join-btn">Join</button>
    </div>

    <!-- Chat -->
    <div id="chat-container">
      <div id="chat-log"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Press Enter to chat..." maxlength="200" />
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
